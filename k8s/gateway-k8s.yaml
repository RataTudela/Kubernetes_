apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway-app
          image: tu-usuario-dockerhub/api-gateway:v1
          ports:
            - containerPort: 8081
          env:
            - name: USUARIOS_SERVICE_URL
              value: "http://usuarios-service:8080"
            - name: PROYECTOS_SERVICE_URL
              value: "http://proyectos-service:8067"
            - name: MONITOREO_SERVICE_URL
              value: "http://monitoreo-service:8000"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
spec:
  ports:
    - port: 8081
      targetPort: 8081
  selector:
    app: gateway