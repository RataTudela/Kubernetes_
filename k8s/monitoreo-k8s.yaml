apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitoreo-deployment
  labels:
    app: monitoreo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: monitoreo
  template:
    metadata:
      labels:
        app: monitoreo
    spec:
      containers:
        - name: monitoreo-app
          image: ratatudela/monitoreo-service:latest
          ports:
            - containerPort: 8000
          env:
            - name: PORT
              value: "8000"
            - name: DATABASE_URL
              value: "postgresql://neondb_owner:npg_DOr32IgmeUGC@ep-jolly-forest-a4hn1jmr-pooler.us-east-1.aws.neon.tech/neondb?sslmode=require"
            - name: USUARIOS_SERVICE_URL
              value: "http://usuarios-service:8080"
            - name: PROYECTOS_SERVICE_URL
              value: "http://proyectos-service:8067"
---
apiVersion: v1
kind: Service
metadata:
  name: monitoreo-service
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: monitoreo